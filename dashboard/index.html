<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailax · Meta Ads — Spend & Leads</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8; --surface:#fff; --surface2:#f0f2f5; --border:#e3e7ef;
  --text:#141c2e; --muted:#6b7899;
  --green:#18a96e; --green-bg:#eaf7f2; --red:#e04f4f; --red-bg:#fdf0f0;
  --blue:#2d6be4; --blue-bg:#edf2fd; --teal:#0ea4ac; --teal-bg:#e6f7f8;
  --amber:#d98c1e; --amber-bg:#fdf5e6;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.04); --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* ── PASSWORD GATE ── */
#gate{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.pw-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 48px;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center}
.pw-brand{font-size:22px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
.pw-brand span{color:var(--blue)}
.pw-card h2{font-size:15px;font-weight:600;margin-bottom:6px}
.pw-card p{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.pw-card input{width:100%;padding:13px 16px;border:1px solid var(--border);border-radius:10px;font-family:'Sora',sans-serif;font-size:15px;background:var(--surface2);outline:none;letter-spacing:2px;margin-bottom:14px}
.pw-card input:focus{border-color:var(--blue)}
.pw-btn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'Sora',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.pw-btn:hover{background:#1f56cc}
.pw-btn:disabled{background:#b8c5dd;cursor:not-allowed}
.pw-err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px}

/* ── APP ── */
#app{display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:12px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.3px}
.logo span{color:var(--blue)}
.logo .sub{display:block;font-size:12px;font-weight:400;color:var(--muted)}
.hr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;border-radius:20px;padding:4px 10px;border:1px solid}
.badge .dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.5s infinite}
.badge.on{background:var(--green-bg);color:var(--green);border-color:#b5e8d5}
.badge.on .dot{background:var(--green)}
.badge.off{background:var(--surface2);color:var(--muted);border-color:var(--border)}
.badge.off .dot{background:var(--muted);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

main{padding:22px 26px;max-width:1280px;margin:0 auto}
.filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;box-shadow:var(--shadow)}
.filters label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
.pbtn{font-size:12px;font-weight:600;padding:6px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--muted);cursor:pointer}
.pbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
input[type=date]{font-family:'Sora',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:7px;padding:6px 10px;background:var(--surface2)}
.fsep{width:1px;height:22px;background:var(--border)}
.updated{margin-left:auto;font-size:12px;color:var(--muted)}
.btn-refresh{font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer}
.btn-refresh:hover{background:var(--blue-bg);color:var(--blue)}

/* GHL summary strip */
.ghl-strip{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--green);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.ghl-strip .gh{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ghl-strip .grow{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
.ghl-strip .gbig{font-size:30px;font-weight:700}
.ghl-note{font-size:11px;color:var(--amber);background:var(--amber-bg);border:1px solid #f0dbaa;border-radius:8px;padding:8px 12px;margin-top:12px;line-height:1.5}

/* Account section */
.acct{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden}
.acct-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.acct-head .an{font-size:16px;font-weight:700}
.acct-head .as{font-size:12px;color:var(--muted)}
.acct-head .acur{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.acct-body{padding:18px 20px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kpi{border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi .kl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.kpi .kv{font-size:26px;font-weight:700;line-height:1}
.kpi .ks{font-size:11px;color:var(--muted);margin-top:5px}
.src-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.src-meta{background:var(--blue-bg);color:var(--blue)}
.src-ghl{background:var(--green-bg);color:var(--green)}

.dtable{width:100%;border-collapse:collapse}
.dtable th{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);text-align:left;padding:0 10px 10px;border-bottom:1px solid var(--border)}
.dtable th.num,.dtable td.num{text-align:right}
.dtable td{padding:9px 10px;font-size:13px;border-bottom:1px solid var(--surface2)}
.dtable td.num{font-family:'JetBrains Mono',monospace}
.dtable td.strong{font-weight:700}
.dtable .bar{width:34%}
.dtable .bar span{display:block;height:8px;border-radius:4px;min-width:2px}
.dtable tr.today td{background:#fbfdff}
.dtable tfoot td{padding:11px 10px;font-weight:700;border-top:2px solid var(--border);font-size:13px}
.dtable tfoot td.num{font-family:'JetBrains Mono',monospace}

.err{color:var(--red);font-size:13px;padding:10px 0}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:24px 0}
footer{text-align:center;font-size:11px;color:var(--muted);padding:24px;line-height:1.6}

@media (max-width:720px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .dtable .bar{display:none}
}
</style>
</head>
<body>

<!-- ── PASSWORD GATE ── -->
<div id="gate">
  <div class="pw-card">
    <div class="pw-brand">Sail<span>ax</span></div>
    <h2>Meta Ads Dashboard</h2>
    <p>Spend &amp; leads across Sailax UK and Sailax AU.</p>
    <div class="pw-err" id="pw-err"></div>
    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password">
    <button class="pw-btn" id="pw-btn">Unlock</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="logo">Sail<span>ax</span> Ads<span class="sub">Meta spend &amp; leads — live</span></div>
    <div class="hr">
      <span class="badge off" id="badge-meta"><span class="dot"></span>Meta</span>
      <span class="badge off" id="badge-ghl"><span class="dot"></span>GHL</span>
    </div>
  </header>

  <main>
    <div class="filters">
      <label>Range</label>
      <button class="pbtn" data-days="7">7d</button>
      <button class="pbtn active" data-days="14">14d</button>
      <button class="pbtn" data-days="30">30d</button>
      <span class="fsep"></span>
      <input type="date" id="d-since">
      <input type="date" id="d-until">
      <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
      <span class="updated" id="updated"></span>
    </div>

    <div id="ghl-summary"></div>
    <div id="accounts"></div>
  </main>

  <footer>
    Sailax Global · Meta Ads Dashboard · Data via Meta Marketing API &amp; GoHighLevel<br>
    Spend is as reported by Meta in each account's currency.
  </footer>
</div>

<script>
// ── Account configuration ──────────────────────────────────────────────
// ghlPipeline: substring of the GHL pipeline name that maps to this account's
// region. Leave null until you confirm pipeline names — while null, the headline
// "Leads" number for the account comes from Meta, and total CRM leads are shown
// in the GHL strip above. Set e.g. ghlPipeline:'uk' to switch Leads to GHL.
const ACCOUNTS = [
  { key:'uk', name:'Sailax UK', sub:'United Kingdom', accountId:'1220120669692442', currency:'GBP', locale:'en-GB', tz:'Europe/London',     accent:'#2d6be4', ghlPipeline:null },
  { key:'au', name:'Sailax AU', sub:'Australia',      accountId:'749874504045597',  currency:'AUD', locale:'en-AU', tz:'Australia/Sydney',  accent:'#0ea4ac', ghlPipeline:null },
];

const API = '/api/dashboard';
const state = { since:null, until:null, meta:{}, ghl:null, cfg:null };

// ── Helpers ────────────────────────────────────────────────────────────
const iso = (d) => d.toISOString().slice(0,10);
function setPreset(days){
  const u = new Date(); const s = new Date(); s.setDate(u.getDate()-(days-1));
  state.since = iso(s); state.until = iso(u);
  document.getElementById('d-since').value = state.since;
  document.getElementById('d-until').value = state.until;
}
function dateList(since, until){
  const out=[]; let d=new Date(since+'T00:00:00'); const end=new Date(until+'T00:00:00');
  while(d<=end){ out.push(iso(d)); d.setDate(d.getDate()+1); } return out;
}
const money = (v,acc) => new Intl.NumberFormat(acc.locale,{style:'currency',currency:acc.currency,maximumFractionDigits:2}).format(v||0);
const fmtDay = (s) => new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const todayIn = (tz) => new Date().toLocaleDateString('en-CA',{timeZone:tz});

// ── Auth ───────────────────────────────────────────────────────────────
async function unlock(){
  const btn=document.getElementById('pw-btn'), err=document.getElementById('pw-err');
  const pw=document.getElementById('pw-input').value;
  if(!pw){ err.textContent='Enter the password.'; return; }
  btn.disabled=true; btn.textContent='Checking…'; err.textContent='';
  try{
    const r=await fetch(API+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const j=await r.json();
    if(j.ok){ sessionStorage.setItem('sailax_dash','1'); enter(); }
    else{ err.textContent='Incorrect password.'; btn.disabled=false; btn.textContent='Unlock'; }
  }catch(e){ err.textContent='Auth endpoint unreachable. Is the app deployed on Vercel with DASHBOARD_PASSWORD set?'; btn.disabled=false; btn.textContent='Unlock'; }
}
function enter(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}

// ── Init + config ──────────────────────────────────────────────────────
async function init(){
  try{ state.cfg = await (await fetch(API+'/config')).json(); }
  catch(e){ state.cfg = { metaConfigured:false, ghlConfigured:false, ghlLocationId:'' }; }
  setBadge('badge-meta','Meta', state.cfg.metaConfigured);
  setBadge('badge-ghl','GHL', state.cfg.ghlConfigured);
  setPreset(14);
  await load();
}
function setBadge(id,label,on){
  const el=document.getElementById(id);
  el.className='badge '+(on?'on':'off');
  el.innerHTML='<span class="dot"></span>'+label+(on?'':' · off');
}

// ── Load data ──────────────────────────────────────────────────────────
async function load(){
  const acc=document.getElementById('accounts');
  acc.innerHTML='<div class="empty">Loading…</div>';
  // Meta — per account, in parallel
  await Promise.all(ACCOUNTS.map(async (a)=>{
    try{
      const r=await fetch(`${API}/meta?account=${a.accountId}&since=${state.since}&until=${state.until}`);
      const j=await r.json();
      state.meta[a.key] = r.ok ? j : { error: j.error || ('HTTP '+r.status) };
    }catch(e){ state.meta[a.key]={ error:e.message }; }
  }));
  // GHL — once for the location (optional)
  state.ghl=null;
  if(state.cfg.ghlConfigured){
    try{ state.ghl = await loadGHL(); }
    catch(e){ state.ghl = { error:e.message }; }
  }
  render();
  document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// ── GHL ────────────────────────────────────────────────────────────────
async function ghlFetch(path){
  const r=await fetch(`${API}/ghl?path=${encodeURIComponent(path)}`);
  const j=await r.json();
  if(!r.ok) throw new Error(j.error||('GHL HTTP '+r.status));
  return j;
}
async function loadGHL(){
  const loc=state.cfg.ghlLocationId;
  if(!loc) throw new Error('GHL_LOCATION_ID not set in Vercel.');
  let all=[], after=null, afterId=null, page=0;
  while(true){
    page++;
    let p=`/opportunities/search?location_id=${loc}&limit=100`;
    if(after) p+=`&startAfter=${after}&startAfterId=${afterId}`;
    const j=await ghlFetch(p);
    const opps=j.opportunities||[];
    all=all.concat(opps);
    if(opps.length<100 || !(j.meta&&j.meta.nextPageUrl)) break;
    after=j.meta&&j.meta.startAfter; afterId=j.meta&&j.meta.startAfterId;
    if(!after || page>60) break;
  }
  return all;
}
// Count opportunities created per YYYY-MM-DD (in tz), optional pipeline-name filter.
function ghlPerDay(opps, tz, since, until, pipelineFilter){
  const cnt={};
  if(!Array.isArray(opps)) return cnt;
  opps.forEach((o)=>{
    if(pipelineFilter){
      const pn=((o.pipeline&&o.pipeline.name)||o.pipelineName||'').toLowerCase();
      if(!pn.includes(pipelineFilter.toLowerCase())) return;
    }
    const created=o.createdAt||o.created_at||o.dateAdded;
    if(!created) return;
    const day=new Date(created).toLocaleDateString('en-CA',{timeZone:tz});
    if(day>=since && day<=until) cnt[day]=(cnt[day]||0)+1;
  });
  return cnt;
}

// ── Render ─────────────────────────────────────────────────────────────
function render(){
  renderGHLSummary();
  document.getElementById('accounts').innerHTML = ACCOUNTS.map(renderAccount).join('');
}

function renderGHLSummary(){
  const host=document.getElementById('ghl-summary');
  if(!state.cfg.ghlConfigured){ host.innerHTML=''; return; }
  if(state.ghl && state.ghl.error){
    host.innerHTML=`<div class="ghl-strip"><div class="gh">CRM Leads · GoHighLevel</div><div class="err">GHL error: ${state.ghl.error}</div></div>`;
    return;
  }
  const opps=Array.isArray(state.ghl)?state.ghl:[];
  // Total CRM leads/day across the location (UTC day bucket for the summary).
  const perDay=ghlPerDay(opps,'UTC',state.since,state.until,null);
  const total=Object.values(perDay).reduce((a,b)=>a+b,0);
  const dates=dateList(state.since,state.until);
  const max=Math.max(1,...dates.map(d=>perDay[d]||0));
  const spark=dates.map(d=>{
    const v=perDay[d]||0; const h=Math.round((v/max)*38)+2;
    return `<span title="${d}: ${v}" style="display:inline-block;width:9px;height:${h}px;background:var(--green);opacity:.85;border-radius:2px;margin-right:2px;vertical-align:bottom"></span>`;
  }).join('');
  const mapped=ACCOUNTS.some(a=>a.ghlPipeline);
  host.innerHTML=`
    <div class="ghl-strip">
      <div class="gh"><span class="badge on" style="padding:2px 8px"><span class="dot"></span>Live</span> CRM Leads · GoHighLevel (all pipelines)</div>
      <div class="grow">
        <div><div class="gbig mono">${total}</div><div style="font-size:11px;color:var(--muted)">new opportunities · ${state.since} → ${state.until}</div></div>
        <div style="flex:1;min-width:200px;text-align:right">${spark}</div>
      </div>
      ${mapped?'':`<div class="ghl-note">These are <b>all</b> CRM leads for the connected location. To split them by region (UK vs AU) and use them as each account's headline Leads number, tell me your GHL pipeline names and I'll map them — then the per-account Leads switch from Meta-reported to CRM-confirmed.</div>`}
    </div>`;
}

function renderAccount(a){
  const m=state.meta[a.key];
  const head=`<div class="acct-head"><div><span class="an">${a.name}</span> <span class="as">· ${a.sub} · act_${a.accountId}</span></div><span class="acur">${a.currency}</span></div>`;
  if(!m || m.error){
    return `<section class="acct">${head}<div class="acct-body"><div class="err">Couldn't load Meta data: ${m?m.error:'no response'}</div></div></section>`;
  }
  const days=m.days||[];
  const t=m.totals||{spend:0,leads:0,clicks:0,impressions:0};

  // Leads source: GHL if this account has a pipeline mapping, else Meta.
  let leadsByDay={}, leadsTotal, leadsSrc;
  if(Array.isArray(state.ghl) && a.ghlPipeline){
    leadsByDay=ghlPerDay(state.ghl,a.tz,state.since,state.until,a.ghlPipeline);
    leadsTotal=Object.values(leadsByDay).reduce((x,y)=>x+y,0);
    leadsSrc='ghl';
  }else{
    days.forEach(d=>leadsByDay[d.date]=d.leads);
    leadsTotal=t.leads; leadsSrc='meta';
  }
  const spendByDay={}; days.forEach(d=>spendByDay[d.date]=d.spend);
  const cpl = leadsTotal>0 ? t.spend/leadsTotal : null;

  const dates=dateList(state.since,state.until).reverse();
  const maxLeads=Math.max(1,...dates.map(d=>leadsByDay[d]||0));
  const today=todayIn(a.tz);
  const rows=dates.map(d=>{
    const lv=leadsByDay[d]||0, sv=spendByDay[d]||0, bw=Math.round((lv/maxLeads)*100);
    return `<tr class="${d===today?'today':''}">
      <td>${d===today?'<b>Today</b>':fmtDay(d)}</td>
      <td class="num">${money(sv,a)}</td>
      <td class="bar"><span style="width:${bw}%;background:${a.accent}"></span></td>
      <td class="num strong">${lv}</td>
      <td class="num">${lv>0?money(sv/lv,a):'—'}</td>
    </tr>`;
  }).join('');

  const tag = leadsSrc==='ghl' ? '<span class="src-tag src-ghl">GHL</span>' : '<span class="src-tag src-meta">Meta</span>';

  return `<section class="acct">${head}
    <div class="acct-body">
      <div class="kpis">
        <div class="kpi"><div class="kl">Ad Spend</div><div class="kv mono">${money(t.spend,a)}</div><div class="ks">${dates.length} days</div></div>
        <div class="kpi"><div class="kl">Leads ${tag}</div><div class="kv mono">${leadsTotal}</div><div class="ks">${leadsSrc==='ghl'?'CRM-confirmed':'Meta-reported'}</div></div>
        <div class="kpi"><div class="kl">Cost / Lead</div><div class="kv mono">${cpl!==null?money(cpl,a):'—'}</div><div class="ks">spend ÷ leads</div></div>
        <div class="kpi"><div class="kl">Clicks</div><div class="kv mono">${t.clicks}</div><div class="ks">${t.impressions.toLocaleString()} impressions</div></div>
      </div>
      <table class="dtable">
        <thead><tr><th>Day</th><th class="num">Spend</th><th class="bar">Leads</th><th class="num">Leads</th><th class="num">Cost/Lead</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="5" class="empty">No data in range</td></tr>'}</tbody>
        <tfoot><tr><td>Total</td><td class="num">${money(t.spend,a)}</td><td></td><td class="num">${leadsTotal}</td><td class="num">${cpl!==null?money(cpl,a):'—'}</td></tr></tfoot>
      </table>
    </div>
  </section>`;
}

// ── Wire up ────────────────────────────────────────────────────────────
document.getElementById('pw-btn').addEventListener('click',unlock);
document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') unlock(); });
document.getElementById('btn-refresh').addEventListener('click',load);
document.querySelectorAll('.pbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); setPreset(parseInt(b.dataset.days,10)); load();
}));
['d-since','d-until'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  state.since=document.getElementById('d-since').value;
  state.until=document.getElementById('d-until').value;
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('active'));
  if(state.since&&state.until&&state.since<=state.until) load();
}));

if(sessionStorage.getItem('sailax_dash')==='1') enter();
</script>
</body>
</html>
