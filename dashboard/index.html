<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailax · Ads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────────────── */
:root{
  --bg:#F5F6F8;
  --surface:#FFFFFF;
  --primary:#FF6B35;
  --primary-10:rgba(255,107,53,.10);
  --primary-20:rgba(255,107,53,.20);
  --secondary:#3B82F6;
  --secondary-10:rgba(59,130,246,.10);
  --secondary-20:rgba(59,130,246,.20);
  --green:#10B981;
  --green-10:rgba(16,185,129,.10);
  --green-20:rgba(16,185,129,.20);
  --red:#EF4444;
  --red-10:rgba(239,68,68,.10);
  --red-20:rgba(239,68,68,.20);
  --text:#111827;
  --muted:#6B7280;
  --faint:#9CA3AF;
  --border:#E5E7EB;
  --border-light:#F3F4F6;
  --shadow:0 4px 20px rgba(0,0,0,.05);
  --shadow-md:0 8px 32px rgba(0,0,0,.08);
  --r:32px;
  --r-sm:12px;
  --r-md:16px;
}

/* ── BASE ────────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;font-weight:500;-webkit-font-smoothing:antialiased}

/* ── GATE ────────────────────────────────────────────────────────────── */
#gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--bg)}
.pw-card{background:var(--surface);border-radius:var(--r);padding:48px 44px;width:100%;max-width:420px;box-shadow:var(--shadow-md);text-align:center;border-top:4px solid var(--primary)}
.pw-logo{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:4px}
.pw-logo em{font-style:normal;color:var(--primary)}
.pw-card h2{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--text)}
.pw-card p{font-size:14px;color:var(--muted);margin-bottom:32px;line-height:1.6}
.pw-input{width:100%;padding:14px 18px;border:2px solid var(--border);border-radius:var(--r-md);font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;background:var(--bg);color:var(--text);outline:none;margin-bottom:14px;transition:border-color .2s;letter-spacing:2px}
.pw-input:focus{border-color:var(--primary)}
.pw-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-md);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
.pw-btn:hover{background:#e85a25}
.pw-btn:active{transform:scale(.99)}
.pw-btn:disabled{background:#D1D5DB;cursor:not-allowed}
.pw-err{color:var(--red);font-size:12px;min-height:18px;margin-bottom:10px;font-weight:500}

/* ── APP ─────────────────────────────────────────────────────────────── */
#app{display:none}

/* ── HEADER ──────────────────────────────────────────────────────────── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 var(--border)}
.logo{font-size:20px;font-weight:700;letter-spacing:-.4px;color:var(--text);white-space:nowrap}
.logo em{font-style:normal;color:var(--primary)}
.acct-tabs{display:flex;gap:6px;flex:1}
.atab{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;padding:8px 20px;border:2px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;letter-spacing:-.2px}
.atab:hover{border-color:var(--primary);color:var(--primary)}
.atab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.hright{display:flex;align-items:center;gap:10px}
.hbadge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;border-radius:var(--r-sm);padding:5px 12px;border:1px solid;backdrop-filter:blur(4px)}
.hbadge .dot{width:7px;height:7px;border-radius:50%;animation:pulse 1.8s infinite}
.hbadge.on{background:var(--green-10);color:var(--green);border-color:var(--green-20)}
.hbadge.on .dot{background:var(--green)}
.hbadge.off{background:var(--border-light);color:var(--faint);border-color:var(--border)}
.hbadge.off .dot{background:var(--faint);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── MAIN ────────────────────────────────────────────────────────────── */
main{padding:24px 32px;max-width:1440px;margin:0 auto}

/* ── FILTER BAR ──────────────────────────────────────────────────────── */
.filters{background:var(--surface);border-radius:var(--r-md);padding:12px 18px;display:flex;align-items:center;gap:10px;margin-bottom:24px;box-shadow:var(--shadow);flex-wrap:wrap}
.fl{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.8px}
.pbtn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border:2px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.pbtn:hover{border-color:var(--primary);color:var(--primary)}
.pbtn.active{background:var(--primary);border-color:var(--primary);color:#fff}
input[type=date]{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;border:2px solid var(--border);border-radius:var(--r-sm);padding:7px 12px;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
input[type=date]:focus{border-color:var(--primary)}
.fsep{width:1px;height:24px;background:var(--border)}
.updated{margin-left:auto;font-size:12px;color:var(--faint);font-weight:500}
.btn-refresh{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border:2px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-refresh:hover{background:var(--primary);border-color:var(--primary);color:#fff}

/* ── CARD ────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-hd{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-hd h3{font-size:16px;font-weight:600;color:var(--text)}
.card-bd{padding:20px 24px 24px}
.tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* ── GLASS TAGS ──────────────────────────────────────────────────────── */
.tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:var(--r-sm);border:1px solid;backdrop-filter:blur(6px);letter-spacing:.2px;white-space:nowrap}
.tag-orange{background:var(--primary-10);color:var(--primary);border-color:var(--primary-20)}
.tag-blue{background:var(--secondary-10);color:var(--secondary);border-color:var(--secondary-20)}
.tag-green{background:var(--green-10);color:var(--green);border-color:var(--green-20)}
.tag-red{background:var(--red-10);color:var(--red);border-color:var(--red-20)}
.tag-muted{background:var(--border-light);color:var(--faint);border-color:var(--border)}

/* ── KPI ROW ─────────────────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:24px;transition:box-shadow .2s,transform .2s;cursor:default}
.kpi-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.kpi-value{font-size:36px;font-weight:700;line-height:1;color:var(--text);letter-spacing:-1px}
.kpi-sub{font-size:13px;color:var(--muted);margin-top:8px;font-weight:500}

/* ── GRID LAYOUTS ────────────────────────────────────────────────────── */
.grid-5-5{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid-4-6{display:grid;grid-template-columns:2fr 3fr;gap:20px;margin-bottom:20px}
.mb20{margin-bottom:20px}

/* ── FUNNEL ──────────────────────────────────────────────────────────── */
.funnel{display:flex;flex-direction:column;gap:0}
.funnel-step{margin-bottom:4px}
.funnel-row{display:grid;grid-template-columns:140px 1fr 50px 48px;align-items:center;gap:12px}
.funnel-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.funnel-track{height:30px;background:var(--border-light);border-radius:10px;overflow:hidden;position:relative}
.funnel-fill{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:700;color:#fff;min-width:36px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.funnel-n{font-size:14px;font-weight:700;text-align:right}
.funnel-p{font-size:12px;color:var(--muted);text-align:right;font-weight:500}
.funnel-drop{font-size:11px;font-weight:600;color:var(--red);padding:3px 0 5px 152px;display:flex;align-items:center;gap:4px}
.funnel-drop.up{color:var(--green)}

/* ── STAGE BREAKDOWN ─────────────────────────────────────────────────── */
.stage-list{display:flex;flex-direction:column;gap:12px}
.stage-row{display:grid;grid-template-columns:148px 1fr 40px 42px;align-items:center;gap:10px}
.stage-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-track{height:8px;background:var(--border-light);border-radius:4px;overflow:hidden}
.stage-bar{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.stage-n{font-size:13px;font-weight:700;text-align:right;color:var(--text)}
.stage-p{font-size:12px;color:var(--muted);text-align:right;font-weight:500}

/* ── LEAD SOURCES TABLE ──────────────────────────────────────────────── */
.srctbl{width:100%;border-collapse:collapse}
.srctbl th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);text-align:left;padding:0 10px 12px;border-bottom:1px solid var(--border)}
.srctbl th.r,.srctbl td.r{text-align:right}
.srctbl td{padding:11px 10px;font-size:14px;font-weight:500;border-bottom:1px solid var(--border-light)}
.srctbl tfoot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;padding-top:12px}
.src-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:middle}

/* ── CAMPAIGNS TABLE ─────────────────────────────────────────────────── */
.camptbl{width:100%;border-collapse:collapse}
.camptbl th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);text-align:left;padding:0 12px 12px;border-bottom:1px solid var(--border)}
.camptbl th.r,.camptbl td.r{text-align:right}
.camptbl td{padding:12px 12px;font-size:14px;font-weight:500;border-bottom:1px solid var(--border-light);color:var(--text)}
.camptbl tbody tr:last-child td{border-bottom:none}
.camptbl tfoot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;padding-top:12px}
.camp-name{font-weight:600;color:var(--text)}
.spend-pct-bar{display:inline-block;height:4px;border-radius:2px;background:var(--primary);opacity:.5;margin-left:6px;vertical-align:middle}

/* ── DAILY TABLE ─────────────────────────────────────────────────────── */
.daytbl{width:100%;border-collapse:collapse}
.daytbl th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);text-align:left;padding:0 12px 12px;border-bottom:1px solid var(--border)}
.daytbl th.r,.daytbl td.r{text-align:right}
.daytbl td{padding:11px 12px;font-size:14px;font-weight:500;border-bottom:1px solid var(--border-light)}
.daytbl .barcol{width:22%}
.daytbl .barcol span{display:block;height:6px;border-radius:3px}
.daytbl tr.today td{background:rgba(255,107,53,.03)}
.daytbl tfoot td{font-weight:700;border-top:2px solid var(--border);border-bottom:none;padding-top:12px}

/* ── SVG CHART ───────────────────────────────────────────────────────── */
.chart-legend{display:flex;gap:18px;margin-bottom:14px}
.chart-legend-item{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--muted)}
.chart-legend-item .lline{width:22px;height:3px;border-radius:2px}
.chart-legend-item .ldot{width:9px;height:9px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.chart-svg-wrap{width:100%;overflow:hidden}

/* ── NOTES ───────────────────────────────────────────────────────────── */
.note{font-size:12px;color:#92400E;background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r-sm);padding:10px 14px;margin-top:14px;line-height:1.6;font-weight:500}
.note-red{font-size:12px;color:#991B1B;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r-sm);padding:10px 14px;margin-top:14px;line-height:1.6;font-weight:500}
.empty{color:var(--faint);font-size:14px;text-align:center;padding:32px 0;font-weight:500}
.err-txt{color:var(--red);font-size:14px;font-weight:500;padding:16px 0}

/* ── FOOTER ──────────────────────────────────────────────────────────── */
footer{text-align:center;font-size:12px;color:var(--faint);padding:28px 32px;line-height:1.8;font-weight:400}

/* ── RESPONSIVE ──────────────────────────────────────────────────────── */
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:780px){
  main{padding:16px}
  header{padding:12px 16px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .grid-5-5,.grid-4-6{grid-template-columns:1fr}
  .daytbl .barcol{display:none}
  .kpi-value{font-size:28px}
}
</style>
</head>
<body>

<!-- ── GATE ── -->
<div id="gate">
  <div class="pw-card">
    <div class="pw-logo">Sail<em>ax</em></div>
    <h2>Ads Dashboard</h2>
    <p>Spend &amp; leads for Aquoz and Sailax UK.</p>
    <div class="pw-err" id="pw-err"></div>
    <input id="pw-input" class="pw-input" type="password" placeholder="Password" autocomplete="current-password">
    <button class="pw-btn" id="pw-btn">Unlock →</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="logo">Sail<em style="font-style:normal;color:var(--primary)">ax</em></div>
    <nav class="acct-tabs" id="acct-tabs"></nav>
    <div class="hright">
      <span class="hbadge off" id="badge-meta"><span class="dot"></span>Meta</span>
      <span class="hbadge off" id="badge-ghl"><span class="dot"></span>GHL</span>
    </div>
  </header>

  <main>
    <div class="filters">
      <span class="fl">Range</span>
      <button class="pbtn active" data-days="7">7d</button>
      <button class="pbtn" data-days="14">14d</button>
      <button class="pbtn" data-days="30">30d</button>
      <button class="pbtn" data-days="90">3M</button>
      <span class="fsep"></span>
      <input type="date" id="d-since">
      <input type="date" id="d-until">
      <button class="btn-refresh" id="btn-refresh">↻ Refresh</button>
      <span class="updated" id="updated"></span>
    </div>
    <div id="acct-view"></div>
  </main>

  <footer>
    Sailax Global · Ads Dashboard · Spend via Meta Marketing API · Leads &amp; Stages via GoHighLevel
  </footer>
</div>

<script>
/* ── CONFIG ──────────────────────────────────────────────────────────── */
const ACCOUNTS = [
  { key:'au', name:'Aquoz',     sub:'Australia',      accountId:'1616113923003676', currency:'AUD', locale:'en-AU', tz:'Australia/Sydney', accent:'#FF6B35', ghlLeadSource:'facebook' },
  { key:'uk', name:'Sailax UK', sub:'United Kingdom', accountId:'1220120669692442', currency:'GBP', locale:'en-GB', tz:'Europe/London',    accent:'#3B82F6', ghlLeadSource:null },
];
const API = '/api/dashboard';
const state = { since:null, until:null, meta:{}, ghl:{}, cfg:null };
let activeKey = 'au';

/* ── HELPERS ──────────────────────────────────────────────────────────── */
const iso     = d => d.toISOString().slice(0,10);
const money   = (v,a,dec=0) => new Intl.NumberFormat(a.locale,{style:'currency',currency:a.currency,maximumFractionDigits:dec}).format(v||0);
const fmtDay  = s => new Date(s+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
const todayIn = tz => new Date().toLocaleDateString('en-CA',{timeZone:tz});
const acctCfg = k => state.cfg?.accounts?.[k] || {ghlConfigured:false,ghlLocationId:''};
const esc     = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function setPreset(days){
  const u=new Date(), s=new Date(); s.setDate(u.getDate()-(days-1));
  state.since=iso(s); state.until=iso(u);
  document.getElementById('d-since').value=state.since;
  document.getElementById('d-until').value=state.until;
}
function dateList(since,until){
  const out=[]; let d=new Date(since+'T00:00:00'); const e=new Date(until+'T00:00:00');
  while(d<=e){out.push(iso(d));d.setDate(d.getDate()+1);}return out;
}
function cptMoney(v){
  if(v>=1000000) return (v/1000000).toFixed(1)+'M';
  if(v>=1000) return (v/1000).toFixed(0)+'k';
  return v.toFixed(0);
}

/* ── AUTH ─────────────────────────────────────────────────────────────── */
async function unlock(){
  const btn=document.getElementById('pw-btn'), err=document.getElementById('pw-err');
  const pw=document.getElementById('pw-input').value;
  if(!pw){err.textContent='Enter the password.';return;}
  btn.disabled=true; btn.textContent='Checking…'; err.textContent='';
  try{
    const r=await fetch(API+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const j=await r.json();
    if(j.ok){sessionStorage.setItem('sailax_dash','1');enter();}
    else{err.textContent='Incorrect password.';btn.disabled=false;btn.textContent='Unlock →';}
  }catch(e){err.textContent='Auth endpoint unreachable.';btn.disabled=false;btn.textContent='Unlock →';}
}
function enter(){
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}

/* ── INIT ─────────────────────────────────────────────────────────────── */
async function init(){
  const nav=document.getElementById('acct-tabs');
  nav.innerHTML=ACCOUNTS.map(a=>`<button class="atab${a.key===activeKey?' active':''}" data-key="${a.key}">${esc(a.name)}</button>`).join('');
  nav.querySelectorAll('.atab').forEach(b=>b.addEventListener('click',()=>{
    activeKey=b.dataset.key;
    nav.querySelectorAll('.atab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  }));
  try{state.cfg=await(await fetch(API+'/config')).json();}
  catch{state.cfg={metaConfigured:false,accounts:{}};}
  setBadge('badge-meta','Meta',!!state.cfg.metaConfigured);
  setBadge('badge-ghl','GHL',ACCOUNTS.some(a=>acctCfg(a.key).ghlConfigured));
  setPreset(7);
  await load();
}
function setBadge(id,label,on){
  const el=document.getElementById(id);
  el.className='hbadge '+(on?'on':'off');
  el.innerHTML=`<span class="dot"></span>${label}${on?'':' · off'}`;
}

/* ── LOAD ─────────────────────────────────────────────────────────────── */
async function load(){
  document.getElementById('acct-view').innerHTML='<div class="empty">Loading…</div>';
  state.meta={}; state.ghl={};
  await Promise.all(ACCOUNTS.map(async a=>{
    try{
      const r=await fetch(`${API}/meta?account=${a.accountId}&since=${state.since}&until=${state.until}`);
      const j=await r.json();
      state.meta[a.key]=r.ok?j:{error:j.error||'HTTP '+r.status};
    }catch(e){state.meta[a.key]={error:e.message};}
    if(acctCfg(a.key).ghlConfigured){
      try{state.ghl[a.key]=await loadGHL(a.key,acctCfg(a.key).ghlLocationId);}
      catch(e){state.ghl[a.key]={error:e.message};}
    }
  }));
  render();
  document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

/* ── GHL ──────────────────────────────────────────────────────────────── */
async function ghlFetch(account,path){
  const r=await fetch(`${API}/ghl?account=${account}&path=${encodeURIComponent(path)}`);
  const j=await r.json();
  if(!r.ok) throw new Error(j.error||'GHL HTTP '+r.status);
  return j;
}
async function loadGHL(account,locationId){
  if(!locationId) throw new Error(`GHL_LOCATION_ID_${account.toUpperCase()} not set.`);
  const [pipes,opps]=await Promise.all([fetchPipelines(account,locationId),fetchAllOpps(account,locationId)]);
  return {opps,pipelines:pipes.pipelines,pipelinesError:pipes.error};
}
async function fetchPipelines(account,locationId){
  let lastErr=null;
  for(const p of ['locationId','location_id']){
    try{const j=await ghlFetch(account,`/opportunities/pipelines?${p}=${locationId}`);if(j&&Array.isArray(j.pipelines))return{pipelines:j.pipelines,error:null};}
    catch(e){lastErr=e.message;}
  }
  return{pipelines:[],error:lastErr||'No pipelines returned'};
}
async function fetchAllOpps(account,locationId){
  let all=[],after=null,afterId=null,page=0;
  while(true){
    page++;
    let p=`/opportunities/search?location_id=${locationId}&limit=100`;
    if(after) p+=`&startAfter=${after}&startAfterId=${afterId}`;
    const j=await ghlFetch(account,p);
    const opps=j.opportunities||[];
    all=all.concat(opps);
    if(opps.length<100||!(j.meta&&j.meta.nextPageUrl)) break;
    after=j.meta?.startAfter; afterId=j.meta?.startAfterId;
    if(!after||page>60) break;
  }
  return all;
}

/* ── DATA TRANSFORMS ─────────────────────────────────────────────────── */
function filterBySource(opps,src){
  if(!src) return opps||[];
  return(opps||[]).filter(o=>(o.source||o.leadSource||o.attributionSource||'').toLowerCase().includes(src.toLowerCase()));
}
function ghlPerDay(opps,tz,since,until){
  const cnt={};
  (opps||[]).forEach(o=>{
    const c=o.createdAt||o.created_at||o.dateAdded; if(!c) return;
    const d=new Date(c).toLocaleDateString('en-CA',{timeZone:tz});
    if(d>=since&&d<=until) cnt[d]=(cnt[d]||0)+1;
  });
  return cnt;
}
function ghlByMonth(opps,tz,since,until){
  const cnt={};
  (opps||[]).forEach(o=>{
    const c=o.createdAt||o.created_at||o.dateAdded; if(!c) return;
    const d=new Date(c).toLocaleDateString('en-CA',{timeZone:tz});
    if(d<since||d>until) return;
    const m=d.slice(0,7); cnt[m]=(cnt[m]||0)+1;
  });
  return cnt;
}
function metaByMonth(days){
  const out={};
  (days||[]).forEach(d=>{
    const m=d.date.slice(0,7);
    if(!out[m]) out[m]={spend:0,leads:0};
    out[m].spend+=d.spend; out[m].leads+=d.leads;
  });
  return out;
}
function stageBreakdown(opps,pipelines,tz,since,until){
  const names={},order={};
  (pipelines||[]).forEach(pl=>(pl.stages||[]).forEach((s,i)=>{names[s.id]=s.name;order[s.id]=s.position??i;}));
  const cnt={};
  (opps||[]).forEach(o=>{
    const c=o.createdAt||o.created_at||o.dateAdded; if(!c) return;
    const d=new Date(c).toLocaleDateString('en-CA',{timeZone:tz});
    if(d<since||d>until) return;
    const sid=o.pipelineStageId||o.stageId||'unknown';
    cnt[sid]=(cnt[sid]||0)+1;
  });
  const total=Object.values(cnt).reduce((a,b)=>a+b,0);
  return Object.entries(cnt)
    .sort((a,b)=>(order[a[0]]??99)-(order[b[0]]??99))
    .map(([sid,n])=>({name:names[sid]||'Unknown stage',count:n,pct:total>0?Math.round(n/total*100):0}));
}
function leadSources(opps,tz,since,until){
  const cnt={};
  (opps||[]).forEach(o=>{
    const c=o.createdAt||o.created_at||o.dateAdded; if(!c) return;
    const d=new Date(c).toLocaleDateString('en-CA',{timeZone:tz});
    if(d<since||d>until) return;
    const src=o.source||o.leadSource||o.attributionSource||'Unknown';
    if(!cnt[src]) cnt[src]={leads:0,won:0};
    cnt[src].leads++;
    if(o.status==='won') cnt[src].won++;
  });
  return Object.entries(cnt).sort((a,b)=>b[1].leads-a[1].leads)
    .map(([s,d])=>({src:s,leads:d.leads,won:d.won,pct:d.leads>0?Math.round(d.won/d.leads*100):0}));
}
function buildFunnel(opps,pipelines,tz,since,until){
  const stages=[];
  (pipelines||[]).forEach(pl=>(pl.stages||[]).sort((a,b)=>(a.position??0)-(b.position??0)).forEach(s=>stages.push(s)));
  const posMap={}; stages.forEach((s,i)=>posMap[s.id]=i);
  const n=stages.length;
  const inRange=(opps||[]).filter(o=>{
    const c=o.createdAt||o.created_at||o.dateAdded; if(!c) return false;
    const d=new Date(c).toLocaleDateString('en-CA',{timeZone:tz});
    return d>=since&&d<=until;
  });
  const total=inRange.length;
  const steps=[{label:'Total Leads',count:total,pct:100}];
  if(n>=2){
    const picks=[1];
    if(n>=4) picks.push(Math.floor(n/2));
    picks.push(n-1);
    [...new Set(picks)].forEach(idx=>{
      const count=inRange.filter(o=>(posMap[o.pipelineStageId]??-1)>=idx).length;
      steps.push({label:stages[idx].name,count,pct:total>0?count/total*100:0});
    });
  } else {
    const won=inRange.filter(o=>o.status==='won').length;
    steps.push({label:'Won',count:won,pct:total>0?won/total*100:0});
  }
  return steps;
}

/* ── SVG CHART ────────────────────────────────────────────────────────── */
function cubicPath(pts){
  if(!pts.length) return '';
  if(pts.length===1) return `M${pts[0].x},${pts[0].y}`;
  let d=`M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length;i++){
    const cpx=(pts[i-1].x+pts[i].x)/2;
    d+=` C${cpx},${pts[i-1].y} ${cpx},${pts[i].y} ${pts[i].x},${pts[i].y}`;
  }
  return d;
}
function buildSVGChart(months,spendArr,leadsArr){
  if(!months.length) return '<div class="empty">No data in this range — try a wider range like 3M</div>';
  const W=800,H=220,PL=60,PR=48,PT=20,PB=40;
  const cW=W-PL-PR, cH=H-PT-PB;
  const n=months.length;
  const maxS=Math.max(...spendArr,1), maxL=Math.max(...leadsArr,1);
  const xAt=i=>PL+(n===1?cW/2:i/(n-1)*cW);
  const yS=v=>PT+cH-(v/maxS)*cH;
  const yL=v=>PT+cH-(v/maxL)*cH;
  const spts=spendArr.map((v,i)=>({x:xAt(i),y:yS(v),v}));
  const lpts=leadsArr.map((v,i)=>({x:xAt(i),y:yL(v),v}));
  const bottom=PT+cH;
  // grid
  const grid=[.25,.5,.75,1].map(f=>{
    const y=PT+cH*(1-f);
    return `<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#F3F4F6" stroke-width="1"/>`;
  }).join('');
  // area fill under spend
  const areaD=spts.length>1?`${cubicPath(spts)} L${spts[spts.length-1].x},${bottom} L${spts[0].x},${bottom} Z`:'';
  // spend y-labels
  const syLabels=[.5,1].map(f=>{
    const y=PT+cH*(1-f);
    return `<text x="${PL-8}" y="${y+4}" text-anchor="end" font-size="11" fill="#9CA3AF" font-family="Outfit,sans-serif">${cptMoney(f*maxS)}</text>`;
  }).join('');
  // leads y-labels
  const lyLabels=[.5,1].map(f=>{
    const y=PT+cH*(1-f);
    return `<text x="${W-PR+8}" y="${y+4}" text-anchor="start" font-size="11" fill="#9CA3AF" font-family="Outfit,sans-serif">${Math.round(f*maxL)}</text>`;
  }).join('');
  // x-labels
  const xLabels=months.map((m,i)=>{
    const d=new Date(m+'-01T12:00:00');
    const lbl=d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
    return `<text x="${xAt(i)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#9CA3AF" font-family="Outfit,sans-serif">${lbl}</text>`;
  }).join('');
  // nodes
  const snodes=spts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#FF6B35" stroke="white" stroke-width="2" filter="url(#ns)"/>`).join('');
  const lnodes=lpts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="5" fill="#3B82F6" stroke="white" stroke-width="2" filter="url(#ns)"/>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">
    <defs>
      <filter id="ns" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.12"/>
      </filter>
      <linearGradient id="sg_fill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.13"/>
        <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    ${grid}
    ${areaD?`<path d="${areaD}" fill="url(#sg_fill)"/>`:''}
    <path d="${cubicPath(spts)}" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${cubicPath(lpts)}" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${syLabels}${lyLabels}${xLabels}
    ${snodes}${lnodes}
  </svg>`;
}

/* ── RENDER ───────────────────────────────────────────────────────────── */
function render(){
  const a=ACCOUNTS.find(x=>x.key===activeKey);
  document.getElementById('acct-view').innerHTML=renderAccount(a);
}

function renderAccount(a){
  const m=state.meta[a.key];
  const gd=state.ghl[a.key];
  const cfg=acctCfg(a.key);

  if(!m||m.error){
    const hint=/permission|access|token|OAuth/i.test(m?.error||'')?
      `<div class="note-red">Token may not have access to act_${a.accountId}. Go to Meta Business Suite → System Users → Sailax → Assign assets → add this ad account → revoke old token → regenerate.</div>`:'';
    return `<div class="card"><div class="card-bd"><div class="err-txt">Meta error: ${esc(m?m.error:'no response')}</div>${hint}</div></div>`;
  }

  const days=m.days||[], t=m.totals||{spend:0,leads:0,clicks:0,impressions:0};
  const spendZero=t.spend===0&&days.length>0;

  const ghlOpps=gd&&Array.isArray(gd.opps)?gd.opps:null;
  const ghlPipelines=gd?.pipelines||[];
  const leadOpps=ghlOpps!==null?filterBySource(ghlOpps,a.ghlLeadSource):null;

  let leadsByDay={},leadsTotal,leadsSrc,ghlErr=null;
  if(leadOpps!==null){
    leadsByDay=ghlPerDay(leadOpps,a.tz,state.since,state.until);
    leadsTotal=Object.values(leadsByDay).reduce((x,y)=>x+y,0);
    leadsSrc='ghl';
  } else {
    if(gd?.error) ghlErr=gd.error;
    days.forEach(d=>leadsByDay[d.date]=d.leads);
    leadsTotal=t.leads; leadsSrc='meta';
  }
  const spendByDay={}; days.forEach(d=>spendByDay[d.date]=d.spend);
  const cpl=leadsTotal>0?t.spend/leadsTotal:null;

  // Source tag
  const srcTag=leadsSrc==='ghl'
    ?`<span class="tag tag-green">GHL${a.ghlLeadSource?' · Facebook':''}</span>`
    :'<span class="tag tag-blue">Meta</span>';

  // ── KPIs ──
  const kpis=`<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Ad Spend <span class="tag tag-orange" style="font-size:10px">${a.currency}</span></div>
      <div class="kpi-value">${money(t.spend,a)}</div>
      <div class="kpi-sub">${days.length} day${days.length!==1?'s':''}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Leads ${srcTag}</div>
      <div class="kpi-value">${leadsTotal}</div>
      <div class="kpi-sub">${leadsSrc==='ghl'?'CRM-confirmed':'Meta-reported'}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Cost / Lead</div>
      <div class="kpi-value" style="font-size:${cpl!==null&&money(cpl,a).length>8?'28px':'36px'}">${cpl!==null?money(cpl,a):'—'}</div>
      <div class="kpi-sub">spend ÷ leads</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Clicks</div>
      <div class="kpi-value">${t.clicks.toLocaleString()}</div>
      <div class="kpi-sub">${t.impressions.toLocaleString()} impressions</div>
    </div>
  </div>`;

  // ── Lead Funnel ──
  let funnelCard='';
  if(leadOpps!==null){
    const steps=buildFunnel(leadOpps,ghlPipelines,a.tz,state.since,state.until);
    const fRows=steps.map((s,i)=>{
      const bw=Math.round(s.pct);
      const grad=a.key==='au'
        ?`linear-gradient(90deg,#FF6B35,#FF8C61)`
        :`linear-gradient(90deg,#3B82F6,#60A5FA)`;
      let drop='';
      if(i>0&&steps[i-1].count>0){
        const dPct=Math.round((1-s.count/steps[i-1].count)*100);
        drop=`<div class="funnel-drop">↓ ${dPct}% drop-off</div>`;
      }
      return `${drop}<div class="funnel-step"><div class="funnel-row">
        <div class="funnel-name" title="${esc(s.label)}">${esc(s.label)}</div>
        <div class="funnel-track"><div class="funnel-fill" style="width:${bw}%;background:${grad}">${bw>18?s.count:''}</div></div>
        <div class="funnel-n">${bw<=18?s.count:''}</div>
        <div class="funnel-p">${s.pct.toFixed(0)}%</div>
      </div></div>`;
    }).join('');
    funnelCard=`<div class="card"><div class="card-hd"><h3>Lead Funnel</h3><div class="tags"><span class="tag tag-green">GHL · in range</span></div></div><div class="card-bd"><div class="funnel">${fRows}</div></div></div>`;
  }

  // ── Monthly Chart ──
  const mByMonth=metaByMonth(days);
  const gByMonth=leadOpps!==null?ghlByMonth(leadOpps,a.tz,state.since,state.until):{};
  const allMonths=[...new Set([...Object.keys(mByMonth),...Object.keys(gByMonth)])].sort();
  const spendArr=allMonths.map(m=>mByMonth[m]?.spend||0);
  const leadsArr=allMonths.map(m=>gByMonth[m]||0);
  const chartSVG=buildSVGChart(allMonths,spendArr,leadsArr);
  const chartCard=`<div class="card"><div class="card-hd"><h3>Monthly Spend vs Leads</h3>
    <div class="chart-legend">
      <div class="chart-legend-item"><div class="lline" style="background:#FF6B35"></div><div class="ldot" style="background:#FF6B35"></div>Spend</div>
      <div class="chart-legend-item"><div class="lline" style="background:#3B82F6"></div><div class="ldot" style="background:#3B82F6"></div>Leads</div>
    </div>
  </div><div class="card-bd"><div class="chart-svg-wrap">${chartSVG}</div></div></div>`;

  // ── Stage Breakdown ──
  let stagesCard='';
  if(leadOpps!==null){
    const stages=stageBreakdown(leadOpps,ghlPipelines,a.tz,state.since,state.until);
    if(stages.length){
      const maxC=Math.max(1,...stages.map(s=>s.count));
      const allUnknown=stages.every(s=>s.name==='Unknown stage');
      const rows=stages.map(s=>`<div class="stage-row">
        <div class="stage-name" title="${esc(s.name)}">${esc(s.name)}</div>
        <div class="stage-track"><div class="stage-bar" style="width:${Math.round(s.count/maxC*100)}%;background:${a.accent}"></div></div>
        <div class="stage-n">${s.count}</div>
        <div class="stage-p">${s.pct}%</div>
      </div>`).join('');
      const diag=allUnknown&&gd?.pipelinesError?`<div class="note-red">Can't load stage names (${esc(gd.pipelinesError)}). Check the GHL Private Integration token has Opportunities scope.</div>`:'';
      stagesCard=`<div class="card"><div class="card-hd"><h3>Stage Breakdown</h3><div class="tags"><span class="tag tag-green">GHL · in range</span></div></div><div class="card-bd"><div class="stage-list">${rows}</div>${diag}</div></div>`;
    }
  }

  // ── Lead Sources ──
  let sourcesCard='';
  if(ghlOpps!==null){
    const srcs=leadSources(ghlOpps,a.tz,state.since,state.until);
    if(srcs.length&&srcs.some(s=>s.src!=='Unknown')){
      const colors=['#FF6B35','#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899'];
      const totalL=srcs.reduce((s,x)=>s+x.leads,0);
      const totalW=srcs.reduce((s,x)=>s+x.won,0);
      const rows=srcs.map((s,i)=>`<tr>
        <td><span class="src-dot" style="background:${colors[i%colors.length]}"></span>${esc(s.src)}</td>
        <td class="r">${s.leads}</td>
        <td class="r" style="color:#10B981;font-weight:700">${s.won}</td>
        <td class="r">${s.pct}%</td>
      </tr>`).join('');
      sourcesCard=`<div class="card"><div class="card-hd"><h3>Lead Sources</h3><div class="tags"><span class="tag tag-muted">All sources · GHL</span></div></div><div class="card-bd">
        <table class="srctbl"><thead><tr><th>Source</th><th class="r">Leads</th><th class="r">Won</th><th class="r">Close %</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td><strong>All sources</strong></td><td class="r">${totalL}</td><td class="r" style="color:#10B981">${totalW}</td><td class="r">${totalL>0?Math.round(totalW/totalL*100):0}%</td></tr></tfoot>
        </table>
      </div></div>`;
    }
  }

  // ── Campaigns ──
  let campsCard='';
  const camps=m.campaigns||[];
  if(camps.length){
    const rows=camps.map(c=>{
      const pct=t.spend>0?Math.round(c.spend/t.spend*100):0;
      const cpl2=c.leads>0?money(c.spend/c.leads,a):null;
      return `<tr>
        <td class="camp-name">${esc(c.name)}</td>
        <td class="r">${money(c.spend,a)}<span class="spend-pct-bar" style="width:${pct*1.5}px"></span></td>
        <td class="r"><span class="tag tag-muted">${pct}%</span></td>
        <td class="r">${c.leads||0}</td>
        <td class="r">${cpl2!==null?cpl2:'—'}</td>
      </tr>`;
    }).join('');
    campsCard=`<div class="card mb20"><div class="card-hd"><h3>Campaigns</h3><div class="tags"><span class="tag tag-orange">Meta · by spend</span></div></div><div class="card-bd">
      <table class="camptbl"><thead><tr><th>Campaign</th><th class="r">Spend</th><th class="r">Share</th><th class="r">Leads</th><th class="r">Cost/Lead</th></tr></thead>
      <tbody>${rows}</tbody>
      </table>
    </div></div>`;
  }

  // ── Daily Table ──
  const dates=dateList(state.since,state.until).reverse();
  const maxLeads=Math.max(1,...dates.map(d=>leadsByDay[d]||0));
  const today=todayIn(a.tz);
  const dayRows=dates.map(d=>{
    const lv=leadsByDay[d]||0,sv=spendByDay[d]||0,bw=Math.round(lv/maxLeads*100);
    return `<tr class="${d===today?'today':''}">
      <td style="font-weight:${d===today?700:500}">${d===today?'Today':fmtDay(d)}</td>
      <td class="r">${money(sv,a)}</td>
      <td class="barcol"><span style="width:${bw}%;background:${a.accent};opacity:.7"></span></td>
      <td class="r" style="font-weight:700">${lv}</td>
      <td class="r">${lv>0?money(sv/lv,a):'—'}</td>
    </tr>`;
  }).join('');
  const dailyCard=`<div class="card mb20"><div class="card-hd"><h3>Daily Breakdown</h3></div><div class="card-bd">
    <table class="daytbl"><thead><tr><th>Day</th><th class="r">Spend</th><th class="barcol"></th><th class="r">Leads</th><th class="r">Cost/Lead</th></tr></thead>
    <tbody>${dayRows||'<tr><td colspan="5" class="empty">No data in range</td></tr>'}</tbody>
    <tfoot><tr><td>Total</td><td class="r">${money(t.spend,a)}</td><td></td><td class="r">${leadsTotal}</td><td class="r">${cpl!==null?money(cpl,a):'—'}</td></tr></tfoot>
    </table>
  </div></div>`;

  // ── Notes ──
  let notes='';
  if(spendZero) notes+=`<div class="note-red mb20">Spend is $0 — the Meta system user token may not have access to act_${a.accountId}. Assign the ad account to your system user, revoke the old token, and generate a new one.</div>`;
  if(ghlErr) notes+=`<div class="note mb20">GHL error (${esc(ghlErr)}) — showing Meta-reported leads.</div>`;
  if(!cfg.ghlConfigured) notes+=`<div class="note mb20">Add <strong>GHL_API_KEY_${a.key.toUpperCase()}</strong> + <strong>GHL_LOCATION_ID_${a.key.toUpperCase()}</strong> in Vercel to enable CRM leads &amp; stages.</div>`;

  const row1=`<div class="grid-4-6 mb20">${funnelCard||''}${chartCard}</div>`;
  const row2=stagesCard||sourcesCard?`<div class="grid-5-5 mb20">${stagesCard||''}${sourcesCard||''}</div>`:'';

  return `${notes}${kpis}${row1}${row2}${campsCard}${dailyCard}`;
}

/* ── WIRE UP ──────────────────────────────────────────────────────────── */
document.getElementById('pw-btn').addEventListener('click',unlock);
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
document.getElementById('btn-refresh').addEventListener('click',load);
document.querySelectorAll('.pbtn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); setPreset(parseInt(b.dataset.days,10)); load();
}));
['d-since','d-until'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  state.since=document.getElementById('d-since').value;
  state.until=document.getElementById('d-until').value;
  document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('active'));
  if(state.since&&state.until&&state.since<=state.until) load();
}));
if(sessionStorage.getItem('sailax_dash')==='1') enter();
